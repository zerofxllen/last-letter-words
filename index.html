<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Interactive Word Search</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }\n        h1 { text-align: center; }\n        input { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; }\n        #results { list-style: none; padding: 0; }\n        .result { padding: 10px; background: #fff; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }\n    </style>\n</head>\n<body>\n    <h1>Word Search</h1>\n    <input type="text" id="search" placeholder="Type to search...">\n    <div id="count"></div>\n    <ul id="results"></ul>\n    <script>\n        const words = [];  // This will be filled with words from the JSON file\n        const resultContainer = document.getElementById('results');\n        const countDisplay = document.getElementById('count');\n\n        // Fetch words from JSON file\n        async function loadWords() {\n            const response = await fetch('path/to/your/every-word.json');\n            const data = await response.json();\n            words.push(...data);\n            displayResults(words);\n        }\n\n        function displayResults(filteredWords) {\n            resultContainer.innerHTML = '';\n            filteredWords.forEach(word => {\n                const li = document.createElement('li');\n                li.className = 'result';\n                li.textContent = word;\n                resultContainer.appendChild(li);\n            });\n            countDisplay.textContent = filteredWords.length + ' results found';\n        }\n\n        document.getElementById('search').addEventListener('keyup', () => {\n            const searchTerm = document.getElementById('search').value.toLowerCase();\n            const filteredWords = words.filter(word => word.toLowerCase().includes(searchTerm));\n            displayResults(filteredWords);\n        });\n\n        loadWords();\n    <\/script>\n</body>\n</html>
